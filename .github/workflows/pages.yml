name: Déploiement GitHub Pages

# Publie le contenu de docs/ sur GitHub Pages.
# La première exécution active Pages automatiquement (enablement: true),
# donc aucun réglage manuel n'est nécessaire.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Envoi de l'artefact (dossier docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
